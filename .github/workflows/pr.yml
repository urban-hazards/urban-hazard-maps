name: PR Checks

on:
  pull_request:
    branches: [main]

jobs:
  pipeline-ruff-lint:
    name: Pipeline Ruff Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pipeline
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Install dependencies
        run: uv sync --dev
      - name: Ruff check
        run: uv run ruff check src/ tests/

  pipeline-ruff-format:
    name: Pipeline Ruff Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pipeline
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Install dependencies
        run: uv sync --dev
      - name: Ruff format check
        run: uv run ruff format --check src/ tests/

  pipeline-mypy:
    name: Pipeline Mypy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pipeline
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Install dependencies
        run: uv sync --dev
      - name: Mypy
        run: uv run mypy src/

  pipeline-test:
    name: Pipeline Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pipeline
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Install dependencies
        run: uv sync --dev
      - name: Download spaCy model
        run: uv run python -m spacy download en_core_web_sm
      - name: Run tests
        run: uv run pytest

  frontend-check:
    name: Frontend Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Check
        run: pnpm check

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build (no S3 — uses empty fallback data)
        run: pnpm build

  secret-scanning:
    name: Scan for secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # fetch-depth: 0 fetches ALL branches into the local clone. With
          # `--no-update --fail`, trufflehog then scanned credential-shaped
          # strings in unrelated branches' history (e.g. test fixtures on
          # the orchestrator branch) and failed every PR. Use depth 2 so
          # we have one commit of context for the diff range and nothing
          # else.
          fetch-depth: 2
      - name: Determine PR commit range
        id: range
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          # Make sure the base commit is fetched so trufflehog can diff
          # against it. With fetch-depth: 2 the base may not be present.
          git fetch --depth=1 origin "$BASE_SHA" || true
          echo "base=$BASE_SHA" >> "$GITHUB_OUTPUT"
          echo "head=$HEAD_SHA" >> "$GITHUB_OUTPUT"
      - name: Pull trufflehog Docker image
        run: docker pull ghcr.io/trufflesecurity/trufflehog:latest
      - name: Run trufflehog scan (PR diff only)
        # Scan only commits the PR introduces (BASE..HEAD). Pre-existing
        # credential-shaped content in main's history is not the PR's
        # responsibility — that lives in the rotate-and-block-with-push-
        # protection layer, not in PR CI.
        run: |
          docker run --rm -v "$PWD:/repo" ghcr.io/trufflesecurity/trufflehog:latest \
            git file:///repo \
            --since-commit=${{ steps.range.outputs.base }} \
            --branch=${{ steps.range.outputs.head }} \
            --fail \
            --no-update \
            --exclude-paths=/repo/.github/trufflehog-excludes.txt

  notify-on-secret-found:
    name: Notify on secret found
    runs-on: ubuntu-latest
    needs: [secret-scanning]
    if: failure()
    steps:
      - name: Send email alert
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.NOTIFY_EMAIL }}
          password: ${{ secrets.NOTIFY_EMAIL_PASSWORD }}
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: Urban Hazard Maps <${{ secrets.NOTIFY_EMAIL }}>
          subject: "⚠️ Secret detected in PR #${{ github.event.pull_request.number }}"
          body: |
            TruffleHog found a potential secret in a pull request.

            PR: ${{ github.event.pull_request.title }}
            Author: ${{ github.event.pull_request.user.login }}
            Link: ${{ github.event.pull_request.html_url }}

            Rotate any exposed credentials immediately, then close or fix the PR.

  all-checks-pass:
    name: All Checks Pass
    runs-on: ubuntu-latest
    if: always()
    needs: [pipeline-ruff-lint, pipeline-ruff-format, pipeline-mypy, pipeline-test, frontend-check, frontend-build, secret-scanning]
    steps:
      - name: Verify all checks passed
        run: |
          if [[ "${{ needs.pipeline-ruff-lint.result }}" != "success" ||
                "${{ needs.pipeline-ruff-format.result }}" != "success" ||
                "${{ needs.pipeline-mypy.result }}" != "success" ||
                "${{ needs.pipeline-test.result }}" != "success" ||
                "${{ needs.frontend-check.result }}" != "success" ||
                "${{ needs.frontend-build.result }}" != "success" ||
                "${{ needs.secret-scanning.result }}" != "success" ]]; then
            echo "One or more checks failed."
            exit 1
          fi
          echo "All checks passed."
