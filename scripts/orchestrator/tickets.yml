  - id: B4
    wave: 1
    status: pending   # scoped to scaffold-only; full integration deferred per ticket
    ticket_source: /tmp/uhm_issues/B4.md
    kimi_brief: |
      Scaffold a tiny heat-curve utility module so future heatmap rendering
      work can pick from three named curve shapes without re-deriving the
      math. This is scaffold-only — no UI changes, no HeatMap.tsx edits.

      Create exactly one new file at `frontend/src/lib/heat-curves.ts`
      containing:

      1. A type alias `export type HeatCurve = "linear" | "logarithmic" | "exponential"`.

      2. Three pure functions that map a normalized intensity in [0, 1] to a
         normalized intensity in [0, 1]. Clamp inputs to the closed interval
         before computing; return values must also lie in [0, 1].

           export function linear(t: number): number
           export function logarithmic(t: number): number
           export function exponential(t: number): number

         Use these formulas:
           - linear(t)        => t
           - logarithmic(t)   => Math.log10(1 + 9 * t)
                                 (maps 0 -> 0, 1 -> 1; emphasizes low end)
           - exponential(t)   => (Math.exp(t) - 1) / (Math.E - 1)
                                 (maps 0 -> 0, 1 -> 1; emphasizes high end)

      3. A const map for lookup:
           export const HEAT_CURVES: Record<HeatCurve, (t: number) => number> = {
               linear, logarithmic, exponential,
           }

      Code style: tabs, no semicolons, TypeScript strict. No imports. No
      side effects. Module must compile under `pnpm build`.
    acceptance:
      - "frontend/src/lib/heat-curves.ts exists"
      - "Module exports HeatCurve type, linear, logarithmic, exponential, HEAT_CURVES"
      - "All three functions clamp t to [0, 1] before computing"
      - "pnpm build completes without errors"
      - "No edits to any existing file"
    allowed_files:
      - frontend/src/lib/heat-curves.ts
    scope_note: |
      Scaffold-only by design. The source ticket is a research spike
      (prototype 3 curve variants on real data, capture screenshots,
      pick a default with Brian + Andrew, expose others as a dev-mode
      toggle). This PR ships the math primitives so the live integration
      can be done in a follow-up that touches HeatMap.tsx — which is
      1,100+ lines and unsafe for the orchestrator's full-file output
      mode. The follow-up will be done by hand (or via a tightly-scoped
      surgical edit) once the curves are wired in.
    depends_on: []

  - id: C1
    wave: 1
    status: pending
    ticket_source: /tmp/uhm_issues/C1.md
    kimi_brief: |
      Disable map panning while keeping zoom enabled. Per the ticket
      decision, panning adds no value for the public viewer — the data fits
      the default frame and panning lets viewers get lost. Other UI cleanups
      (hover-vs-click, control audit, methodology note) are out of scope for
      this single edit; they will be tracked as follow-ups.

      Make exactly one focused change to
      `frontend/src/components/HeatMap.tsx`:

      1. Locate the line that reads (around line 315):
           const map = L.map(mapRef.current, { center: [42.332, -71.078], zoom: 13 })

      2. Add a `dragging: false` option to the options object so it becomes:
           const map = L.map(mapRef.current, {
               center: [42.332, -71.078],
               zoom: 13,
               dragging: false,
           })

      3. Use tabs for indentation, no semicolons, TypeScript strict. The
         multi-line object literal style is fine.

      Do not modify any other line in the file. Do not touch other map
      options, layers, event handlers, or styles. The only behavior change
      should be that the user can no longer pan the map; zoom continues to
      work.
    acceptance:
      - "frontend/src/components/HeatMap.tsx contains 'dragging: false' inside the L.map options object"
      - "No other lines in HeatMap.tsx are modified"
      - "pnpm build completes without errors"
      - "No other files touched"
    allowed_files:
      - frontend/src/components/HeatMap.tsx
    scope_note: |
      Two-option edit in this PR (dragging: false + keyboardPanDelta: 0).
      The original kimi_brief specified only `dragging: false`, but
      Leaflet treats keyboard navigation as a separate handler — arrow
      keys would still pan the map. We don't use `keyboard: false`
      because that disables the entire keyboard handler including
      `+`/`-` zoom keys, which violates the source ticket's "Keep zoom
      enabled". Setting `keyboardPanDelta: 0` keeps the keyboard
      handler active (zoom keys still work) but reduces arrow-key pan
      distance to zero pixels. This is NOT a silent scope drop; it is
      the minimal correct way to satisfy "disable map panning while
      keeping zoom enabled".

      The source ticket is a broader UX-cleanup pass; the following
      items are explicitly deferred to follow-up tickets:
        - Region-click to commit a district filter and reveal pins for
          that region (requires net-new click handlers on the boundary
          GeoJSON layer in HeatMap.tsx, plus filter-state plumbing).
        - Hover-as-preview-only behavior (paired with the above).
        - Full control audit + hide-non-public-controls pass.
        - Methodology page note documenting what was removed.
      The deferral is so we can ship the highest user-confusion-to-
      effort change ahead of the public release and revisit the rest
      after it stabilizes. Note: this PR was hand-applied because the
      orchestrator's full-file output mode truncated 3x on HeatMap.tsx
      (1,100+ lines, beyond the documented safe size of 500 lines).
    depends_on: []

