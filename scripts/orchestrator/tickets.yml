# UHM ticket manifest for the Kimi+Codex orchestrator.
#
# Each entry:
#   id              -- short ticket id (matches /tmp/uhm_issues/<id>.md)
#   wave            -- 1 = parallel batch, 2 = sequential after wave 1
#   status          -- pending | held | done
#   ticket_source   -- path to human-readable ticket markdown (NEVER auto-sent
#                      to Kimi without strategy-strip; see scrub.py)
#   kimi_brief      -- mechanical instruction that Kimi sees. No narrative,
#                      no proper names, no political context. Hand-authored.
#   acceptance      -- pass/fail criteria the audit checks
#   allowed_files   -- whitelist of files Kimi may read or modify. Manifest
#                      is the only source of truth here.
#   depends_on      -- ids that must merge before this one runs

tickets:
  - id: G1a
    wave: 1
    status: done   # calibration pass 2026-05-01, $0.0067, codex APPROVED
    ticket_source: /tmp/uhm_issues/G1a.md
    kimi_brief: |
      Add a "Personnel availability" toggle chip to the Urban Hazard Maps
      frontend. This is a self-contained scaffold; do not modify HeatMap.tsx.

      Concretely, do exactly two things:

      1. Create `frontend/src/data/personnel-availability.json` containing:
            { "ranges": [] }
         The shape is intentional: a single object with a `ranges` array,
         where each entry will eventually look like
            { "start": "YYYY-MM-DD", "end": "YYYY-MM-DD", "label": "string" }
         but the array is empty for now.

      2. Create a new React component at
         `frontend/src/components/PersonnelAvailabilityChip.tsx`. It must:
           - Be a default-exported function component, no props.
           - Import the JSON via `import data from "../data/personnel-availability.json"`.
           - Render a small toggle chip styled with TailwindCSS classes
             ("inline-flex", "items-center", "gap-1", "rounded-full",
             "border", "px-2", "py-0.5", "text-xs"). When pressed, the chip
             toggles a local `enabled` boolean stored with `useState`.
           - Display the label "Personnel availability" followed by a count
             "(N ranges)" where N = data.ranges.length.
           - When enabled, apply class `bg-slate-700 text-white`; when
             disabled, apply class `bg-white text-slate-700`.
           - No external dependencies beyond React. No fetch calls.

      Code style: no semicolons, tabs for indentation, TypeScript strict.
      The component must compile under `pnpm build` (Astro check + build).
    acceptance:
      - "frontend/src/data/personnel-availability.json exists with shape {ranges: []}"
      - "frontend/src/components/PersonnelAvailabilityChip.tsx exists and default-exports a React component"
      - "Component imports JSON via relative path and renders chip text 'Personnel availability (0 ranges)'"
      - "pnpm build completes without errors"
      - "No edits to HeatMap.tsx, index.astro, or any other existing file"
    allowed_files:
      - frontend/src/data/personnel-availability.json
      - frontend/src/components/PersonnelAvailabilityChip.tsx
      - frontend/src/components/Footer.astro      # reference: small Astro component for style
    depends_on: []

