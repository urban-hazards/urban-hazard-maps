services:
  minio:
    image: minio/minio:latest
    container_name: boston-hazards-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: boston-hazards-minio-init
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      until (mc alias set local http://minio:9000 minioadmin minioadmin) do
        echo 'waiting for minio...' && sleep 1;
      done &&
      mc mb --ignore-existing local/boston-hazards &&
      mc anonymous set download local/boston-hazards &&
      echo 'bucket ready' &&
      exit 0
      "

volumes:
  minio-data:
